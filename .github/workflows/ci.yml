name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run test suite (fake driver; perf/stress/contract/e2e are
          opt-in and stay skipped/deselected here)
        run: uv run pytest -q

      - name: Sanity-check the CLI (fake driver — no pyobjc/TCC needed in CI)
        env:
          HANDS_DRIVER: fake
        run: |
          uv run hands doctor
          uv run hands permissions

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Build sdist and wheel
        run: uv build

      - name: Check package metadata
        run: uv run --with twine python -m twine check dist/*
